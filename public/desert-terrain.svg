<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sand-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a86c"/>
      <stop offset="25%" style="stop-color:#d4b896"/>
      <stop offset="50%" style="stop-color:#b8956a"/>
      <stop offset="75%" style="stop-color:#a67c52"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <linearGradient id="dune-shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a67c52;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#5c4033;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="overlay"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#sand-base)"/>
  <ellipse cx="200" cy="450" rx="180" ry="80" fill="url(#dune-shadow)"/>
  <ellipse cx="500" cy="380" rx="220" ry="90" fill="url(#dune-shadow)"/>
  <ellipse cx="350" cy="520" rx="250" ry="70" fill="url(#dune-shadow)"/>
  <ellipse cx="650" cy="480" rx="150" ry="60" fill="url(#dune-shadow)"/>
  <ellipse cx="100" cy="300" rx="120" ry="50" fill="url(#dune-shadow)"/>
  <ellipse cx="700" cy="250" rx="100" ry="45" fill="url(#dune-shadow)"/>
</svg>
